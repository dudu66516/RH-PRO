<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>RH PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">
  <h2>🚀 RS</h2>
  <ul>
    <li onclick="mostrarPagina('dashboard')">📊 Dashboard</li>
    <li onclick="mostrarPagina('candidatos')">👥 Candidatos</li>
  </ul>
</div>

<div class="main">

  <div id="dashboard" class="pagina">
    <h1>📊 Dashboard</h1>

    <div class="cards">
      <div class="card"><h2 id="total">0</h2><p>Total</p></div>
      <div class="card"><h2 id="aprovados">0</h2><p>Aprovados</p></div>
    </div>

    <div class="grafico-container">
      <canvas id="grafico"></canvas>
    </div>
  </div>

  <div id="candidatos" class="pagina" style="display:none;">
    <h1>👥 Candidatos</h1>

    <div id="toast"></div>

    <input id="busca" placeholder="🔍 Buscar...">

    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Vaga</th>
          <th>Status</th>
          <th>Currículo</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
