<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>FlowSystem</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>⚡ FlowSystem</h2>
  <ul>
    <li onclick="mostrarPagina('dashboard')">📊 Dashboard</li>
    <li onclick="mostrarPagina('candidatos')">👥 Candidatos</li>
  </ul>
</div>

<!-- MAIN -->
<div class="main">

  <!-- TOPBAR -->
  <div class="topbar">
    <span>🚀 Sistema de Gestão</span>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="pagina">
    <h1>Dashboard</h1>

    <div class="cards">
      <div class="card">
        <h2 id="total">0</h2>
        <p>Total</p>
      </div>

      <div class="card">
        <h2 id="aprovados">0</h2>
        <p>Aprovados</p>
      </div>
    </div>

    <div class="grafico-container">
      <canvas id="grafico"></canvas>
    </div>
  </div>

  <!-- CANDIDATOS -->
  <div id="candidatos" class="pagina" style="display:none;">
    <h1>Candidatos</h1>

    <div id="toast"></div>

    <input id="busca" placeholder="🔍 Buscar candidato...">

    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Vaga</th>
          <th>Status</th>
          <th>Currículo</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
